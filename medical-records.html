<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medical records — MediCore</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/medical-records.css">
</head>
<body>
<!-- Main application shell container -->
<div class="app-shell">

  <!-- Sidebar navigation -->
  <aside class="app-sidebar">
    <!-- Brand logo section -->
    <div class="brand">
      <svg class="mark" viewBox="0 0 32 32" fill="none"><path d="M16 3 4 8v8c0 8 5.2 13.4 12 17 6.8-3.6 12-9 12-17V8L16 3Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M16 12v9M11.5 16.5h9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>MediCore</span>
    </div>
    <!-- Main navigation menu -->
    <div>
      <p class="sidebar-section-label">Main menu</p>
      <nav class="app-nav" aria-label="Primary">
        <a href="patient-dashboard.html"><svg viewBox="0 0 20 20" fill="none"><path d="M3 10.5 10 4l7 6.5M5 9v7h10V9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>Dashboard</a>
        <a href="appointment-booking.html"><svg viewBox="0 0 20 20" fill="none"><rect x="3" y="4" width="14" height="13" rx="1.6" stroke="currentColor" stroke-width="1.6"/><path d="M3 8h14M7 2.5v3M13 2.5v3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>Appointments</a>
        <a href="medical-records.html" class="active"><svg viewBox="0 0 20 20" fill="none"><path d="M5 3h7l3 3v11a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M7 9h6M7 12h6M7 15h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>Medical records</a>
        <a href="payment.html"><svg viewBox="0 0 20 20" fill="none"><rect x="2.5" y="5" width="15" height="10" rx="1.6" stroke="currentColor" stroke-width="1.6"/><path d="M2.5 8.5h15" stroke="currentColor" stroke-width="1.6"/></svg>Payments</a>
      </nav>
    </div>
    <!-- Sidebar footer with user profile -->
    <div class="sidebar-foot">
      <div class="sidebar-profile">
        <div class="sidebar-avatar" id="sidebar-avatar-initials">—</div>
        <div class="sidebar-profile-info">
          <strong id="who-name">—</strong>
          <span class="role-tag">Patient</span>
        </div>
      </div>
      <button class="btn btn-secondary btn-block" id="logout-btn">Sign out</button>
    </div>
  </aside>

  <!-- Main content area -->
  <main class="app-main">
    <!-- Top bar with page title -->
    <div class="app-topbar">
      <div><h1>Medical records</h1><p class="sub">Your consultation history, prescriptions and lab results.</p></div>
    </div>

    <!-- Tab navigation for records and labs -->
    <div class="tabs" role="tablist">
      <button class="tab active" data-tab="visits" role="tab" aria-selected="true">Consultation history</button>
      <button class="tab" data-tab="labs" role="tab" aria-selected="false">Lab reports</button>
    </div>

    <!-- Consultation history panel -->
    <section id="tab-visits" class="tab-panel">
      <div class="section-head">
        <h2>Consultation history</h2>
        <input type="text" id="record-search" class="table-search" placeholder="Search diagnosis or doctor…">
      </div>
      <div id="records-list" class="records-list"></div>
    </section>

    <!-- Lab reports panel -->
    <section id="tab-labs" class="tab-panel" style="display:none;">
      <div class="section-head"><h2>Lab reports</h2></div>
      <div id="labs-list" class="records-list"></div>
    </section>
  </main>
</div>

<!-- Record detail dialog for showing medical records -->
<dialog id="record-dialog">
  <div id="record-dialog-body"></div>
  <div class="dialog-actions"><button class="btn btn-primary" id="record-close">Close</button></div>
</dialog>

<!-- Toast notification region -->
<div id="toast-region" aria-live="polite"></div>

<script src="js/data.js"></script>
<script src="js/medical-records.js"></script>
</body>
</html>
