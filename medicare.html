<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediCare - Patient Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');
        
        :root { --primary: #0f766e; }
        
        body { font-family: 'Inter', system-ui, sans-serif; }
        .logo-font { font-family: 'Playfair Display', sans-serif; }
        
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        
        .nav-link:hover { color: #14b8a6; transform: translateY(-2px); }
        
        .modal { animation: modalPop 0.3s ease forwards; }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">

    <!-- Top Nav -->
    <nav class="bg-zinc-900 border-b border-zinc-800 fixed w-full z-50">
        <div class="max-w-7xl mx-auto px-8 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-teal-600 rounded-3xl flex items-center justify-center text-3xl font-bold">M</div>
                <div class="logo-font text-4xl font-bold tracking-tighter">MediCare</div>
            </div>
            
            <div class="flex items-center gap-8 text-sm">
                <a onclick="navigateTo('dashboard')" class="nav-link cursor-pointer flex items-center gap-2"><i class="fa-solid fa-house"></i> Dashboard</a>
                <a onclick="navigateTo('appointments')" class="nav-link cursor-pointer flex items-center gap-2"><i class="fa-solid fa-calendar"></i> Appointments</a>
                <a onclick="navigateTo('records')" class="nav-link cursor-pointer flex items-center gap-2"><i class="fa-solid fa-file-medical"></i> Records</a>
                <a onclick="navigateTo('lab')" class="nav-link cursor-pointer flex items-center gap-2"><i class="fa-solid fa-flask"></i> Lab</a>
                <a onclick="navigateTo('payments')" class="nav-link cursor-pointer flex items-center gap-2"><i class="fa-solid fa-credit-card"></i> Payments</a>
            </div>

            <div class="flex items-center gap-6">
                <button onclick="toggleNotifications()" class="relative text-2xl hover:text-teal-400">
                    <i class="fa-solid fa-bell"></i>
                    <span class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full text-[10px] flex items-center justify-center">3</span>
                </button>
                <div onclick="toggleProfile()" class="flex items-center gap-3 cursor-pointer">
                    <img src="https://picsum.photos/id/64/128/128" class="w-9 h-9 rounded-2xl ring-2 ring-teal-500" alt="">
                    <div>
                        <p class="text-sm font-medium">Dr. Sarah Chen</p>
                        <p class="text-xs text-teal-400">Cardiologist</p>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="flex pt-24">
        <!-- Sidebar -->
        <div class="w-72 bg-zinc-900 h-screen fixed border-r border-zinc-800 overflow-y-auto">
            <div class="p-8 space-y-8">
                <!-- Role Switch -->
                <div class="flex bg-zinc-800 rounded-3xl p-1 text-sm">
                    <button onclick="switchRole(0)" class="flex-1 py-3 rounded-3xl">Patient</button>
                    <button onclick="switchRole(1)" id="btn-doctor" class="flex-1 py-3 bg-teal-600 rounded-3xl">Doctor</button>
                    <button onclick="switchRole(2)" class="flex-1 py-3 rounded-3xl">Admin</button>
                </div>

                <!-- Menu -->
                <div class="space-y-2">
                    <a onclick="navigateTo('dashboard')" class="menu-item flex items-center gap-4 px-6 py-4 rounded-3xl hover:bg-zinc-800 active"><i class="fa-solid fa-house w-5"></i> Dashboard</a>
                    <a onclick="navigateTo('appointments')" class="menu-item flex items-center gap-4 px-6 py-4 rounded-3xl hover:bg-zinc-800"><i class="fa-solid fa-calendar-check w-5"></i> Appointments</a>
                    <a onclick="navigateTo('records')" class="menu-item flex items-center gap-4 px-6 py-4 rounded-3xl hover:bg-zinc-800"><i class="fa-solid fa-notes-medical w-5"></i> Medical Records</a>
                    <a onclick="navigateTo('lab')" class="menu-item flex items-center gap-4 px-6 py-4 rounded-3xl hover:bg-zinc-800"><i class="fa-solid fa-vial w-5"></i> Lab Reports</a>
                    <a onclick="navigateTo('payments')" class="menu-item flex items-center gap-4 px-6 py-4 rounded-3xl hover:bg-zinc-800"><i class="fa-solid fa-credit-card w-5"></i> Payments</a>
                </div>
            </div>
        </div>

        <!-- Main Content Area -->
        <div class="flex-1 ml-72 p-10" id="main-content">
            <!-- All pages will be loaded here via JS -->
        </div>
    </div>

    <!-- Login Modal (shown first) -->
    <div id="login-modal" class="fixed inset-0 bg-black/90 flex items-center justify-center z-50">
        <div class="modal bg-zinc-900 w-full max-w-md rounded-3xl p-12">
            <div class="text-center mb-10">
                <div class="mx-auto w-20 h-20 bg-teal-600 rounded-3xl flex items-center justify-center text-5xl mb-6">M</div>
                <h1 class="text-4xl font-bold logo-font">MediCare</h1>
                <p class="text-zinc-400 mt-2">Secure Healthcare Portal</p>
            </div>
            
            <input id="email" type="text" value="sarah.chen@medicare.com" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5 mb-4 focus:border-teal-500 outline-none" placeholder="Email / User ID">
            <input id="password" type="password" value="demo123" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5 mb-6 focus:border-teal-500 outline-none" placeholder="Password">
            
            <button onclick="login()" class="w-full py-6 bg-teal-600 hover:bg-teal-700 rounded-3xl font-semibold text-lg">Sign In Securely</button>
            
            <div class="text-center text-xs text-zinc-500 mt-8">AES-256 • MFA • HIPAA Compliant</div>
        </div>
    </div>

    <script>
        // Navigation
        function navigateTo(page) {
            let content = '';
            
            if(page === 'dashboard') {
                content = `
                    <h1 class="text-5xl font-semibold mb-2">Good afternoon, Dr. Chen</h1>
                    <p class="text-zinc-400 mb-12">Here's your overview</p>
                    
                    <div class="grid grid-cols-4 gap-6 mb-12">
                        <div class="bg-zinc-900 rounded-3xl p-8 card-hover"><div class="text-6xl font-bold">14</div><div class="text-sm text-zinc-400">Appointments Today</div></div>
                        <div class="bg-zinc-900 rounded-3xl p-8 card-hover"><div class="text-6xl font-bold text-emerald-400">87</div><div class="text-sm text-zinc-400">Active Patients</div></div>
                        <div class="bg-zinc-900 rounded-3xl p-8 card-hover"><div class="text-6xl font-bold">7</div><div class="text-sm text-zinc-400">Pending Labs</div></div>
                        <div class="bg-zinc-900 rounded-3xl p-8 card-hover"><div class="text-6xl font-bold">$48k</div><div class="text-sm text-zinc-400">Revenue</div></div>
                    </div>
                    
                    <h2 class="text-3xl font-semibold mb-6">Upcoming Appointments</h2>
                    <div class="grid grid-cols-3 gap-6" id="upcoming"></div>
                `;
            } else if(page === 'appointments') {
                content = `<h1 class="text-4xl font-semibold mb-8">Appointments</h1><div class="bg-zinc-900 rounded-3xl p-10">Appointment booking calendar and list would go here (fully interactive in full version)</div>`;
            } else if(page === 'records') {
                content = `<h1 class="text-4xl font-semibold mb-8">Medical Records</h1><div class="bg-zinc-900 rounded-3xl p-10">Patient records with search, filters, and detailed view panels.</div>`;
            } else if(page === 'lab') {
                content = `<h1 class="text-4xl font-semibold mb-8">Laboratory Reports</h1><div class="bg-zinc-900 rounded-3xl p-10">Lab reports with PDF previews and results charts.</div>`;
            } else if(page === 'payments') {
                content = `
                    <h1 class="text-4xl font-semibold mb-8">Online Payments</h1>
                    <div class="max-w-lg mx-auto bg-gradient-to-br from-teal-900 to-zinc-900 rounded-3xl p-16 text-center">
                        <i class="fa-solid fa-credit-card text-8xl mb-8 text-teal-400"></i>
                        <h2 class="text-3xl font-semibold mb-4">Secure Payment Gateway</h2>
                        <button onclick="processDemoPayment()" class="w-full py-8 bg-white text-zinc-900 rounded-3xl text-xl font-semibold">Pay Invoice Securely</button>
                    </div>
                `;
            }
            
            document.getElementById('main-content').innerHTML = content;
            
            if(page === 'dashboard') {
                renderUpcomingAppointments();
            }
        }

        function renderUpcomingAppointments() {
            document.getElementById('upcoming').innerHTML = `
                <div class="bg-zinc-900 rounded-3xl p-8 card-hover">
                    <div class="font-medium">Emma Thompson</div>
                    <div class="text-teal-400 text-sm">10:30 AM • Follow-up</div>
                    <button onclick="alert('Starting video consultation...')" class="mt-6 w-full py-4 bg-teal-600 rounded-3xl">Join Now</button>
                </div>
                <div class="bg-zinc-900 rounded-3xl p-8 card-hover">James Patel • Tomorrow 9:00 AM</div>
            `;
        }

        function login() {
            document.getElementById('login-modal').style.display = 'none';
            navigateTo('dashboard');
        }

        function toggleNotifications() {
            alert("🛎️ Notifications Panel\n\n• New lab results ready\n• Appointment confirmed");
        }

        function toggleProfile() {
            alert("👤 Profile Menu\n• My Profile\n• Settings\n• Logout");
        }

        function switchRole(n) {
            document.getElementById('btn-doctor').classList.toggle('bg-teal-600', n === 1);
            alert("Role switched! (UI adapts based on role in full system)");
        }

        function processDemoPayment() {
            const msg = document.createElement('div');
            msg.innerHTML = `<div class="fixed inset-0 bg-black/90 flex items-center justify-center z-[999]"><div class="bg-emerald-600 text-white p-16 rounded-3xl text-center"><i class="fa-solid fa-circle-check text-8xl mb-6"></i><h2 class="text-4xl font-bold">Payment Successful!</h2><p class="mt-4">Receipt sent to patient email</p></div></div>`;
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 2800);
        }

        // Initialize
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('login-modal').style.display = 'flex';
            }, 600);
        };
    </script>
</body>
</html>
